<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Bài Thi - Smart Learn</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .timer-badge {
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      font-size: 1.25rem;
      padding: 4px 12px;
      border-radius: 12px;
      background: var(--primary-light);
      color: var(--primary);
    }
    .timer-danger {
      background: var(--danger-light);
      color: var(--danger);
    }
    .option-btn {
      width: 100%;
      padding: 16px 20px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: white;
      text-align: left;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .circle-indicator {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .selected .circle-indicator {
      border-color: var(--primary);
      background: var(--primary);
    }
    .selected .circle-indicator::after {
      content: "";
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
    }
  </style>
</head>
<body style="background: #F1F5F9;">
  <header class="header-bar flex-between">
    <div style="display: flex; align-items: center; gap: 8px;">
      <i data-lucide="shield-check" style="color: var(--primary);"></i>
      <h3 style="font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;">Toán lớp 5 - Ôn tập...</h3>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div class="timer-badge">24:59</div>
      <button class="btn btn-primary" style="width: auto; padding: 6px 12px; border-radius: 10px; font-size: 0.8125rem;">Nộp bài</button>
    </div>
  </header>

  <main class="container">
    <div class="card" style="padding: 12px; background: var(--warning-light); border-color: var(--warning); margin-bottom: 24px;">
      <div style="display: flex; gap: 10px; align-items: flex-start;">
        <i data-lucide="alert-triangle" style="color: var(--warning); flex-shrink: 0;"></i>
        <p style="color: var(--warning); font-size: 0.8125rem; font-weight: 600; line-height: 1.3;">
          Lưu ý quan trọng: Vui lòng không tải lại trang hoặc thoát trình duyệt trong khi đang thực hiện bài thi.
        </p>
      </div>
    </div>

    <div style="margin-bottom: 32px;">
      <div class="badge badge-green" style="margin-bottom: 12px; padding: 6px 16px; border-radius: 12px;">Câu hỏi 1 / 20</div>
      <h2 style="line-height: 1.4; margin-bottom: 24px;">Trong các số sau đây, số nào là số nguyên tố lớn nhất nhỏ hơn 100?</h2>
      
      <div class="option-btn">
        <div class="circle-indicator"></div>
        <span>91</span>
      </div>
      <div class="option-btn selected">
        <div class="circle-indicator"></div>
        <span>97</span>
      </div>
      <div class="option-btn">
        <div class="circle-indicator"></div>
        <span>99</span>
      </div>
      <div class="option-btn">
        <div class="circle-indicator"></div>
        <span>89</span>
      </div>
    </div>

    <div class="card" style="margin-top: 40px;">
      <h3 style="font-size: 0.9375rem; margin-bottom: 16px;">Mục lục câu hỏi</h3>
      <div class="nav-grid">
        <div class="nav-btn active">1</div>
        <div class="nav-btn answered">2</div>
        <div class="nav-btn answered">3</div>
        <div class="nav-btn answered">4</div>
        <div class="nav-btn">5</div>
        <div class="nav-btn">6</div>
        <div class="nav-btn">7</div>
        <div class="nav-btn">8</div>
        <div class="nav-btn">9</div>
        <div class="nav-btn">10</div>
      </div>
    </div>
  </main>

  <footer style="position: sticky; bottom: 0; background: white; padding: 16px; border-top: 1px solid var(--border); display: flex; gap: 12px;">
    <button class="btn btn-ghost" style="flex: 1; justify-content: flex-start; padding-left: 0;">
      <i data-lucide="chevron-left"></i> Câu trước
    </button>
    <button class="btn btn-primary" style="flex: 1;">
      Câu tiếp <i data-lucide="chevron-right"></i>
    </button>
  </footer>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
