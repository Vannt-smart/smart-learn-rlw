<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard Player - Smart Learn</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background: white;">
  <header class="header-bar">
    <div style="display: flex; align-items: center; gap: 12px;">
      <i data-lucide="x" style="color: var(--text-muted); cursor: pointer;"></i>
      <div style="display: flex; flex-direction: column;">
        <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted);">Học phần</span>
        <span style="font-size: 0.875rem; font-weight: 800; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Unit 5: Food & Drink</span>
      </div>
    </div>
    <div style="display: flex; gap: 16px;">
      <i data-lucide="settings" size="20" style="color: var(--text-muted);"></i>
      <i data-lucide="share-2" size="20" style="color: var(--text-muted);"></i>
    </div>
  </header>

  <div class="progress-bar" style="border-radius: 0;">
    <div class="progress-fill" style="width: 25%;"></div>
  </div>

  <main class="container" style="display: flex; flex-direction: column; min-height: calc(100vh - 64px); padding-top: 32px;">
    
    <div style="text-align: center; margin-bottom: 24px;">
      <span style="font-size: 0.8125rem; font-weight: 800; color: var(--text-muted);">THẺ 4 / 24</span>
    </div>

    <!-- 3D Flip Card -->
    <div class="flip-container" onclick="this.querySelector('.flipper').classList.toggle('flipped')">
      <div class="flipper">
        <div class="card-front">
          <p class="flashcard-text">Delicious</p>
          <div style="position: absolute; bottom: 24px; color: var(--text-muted); font-size: 0.75rem; font-weight: 600;">
            <i data-lucide="volume-2" size="16"></i> Click để xem nghĩa
          </div>
        </div>
        <div class="card-back">
          <p class="flashcard-text">Thơm ngon, ngon miệng</p>
          <div style="position: absolute; bottom: 24px; color: var(--primary); font-size: 0.75rem; font-weight: 700;">
            Học phần: Food & Drink
          </div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div style="margin-top: auto; padding-bottom: 32px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding: 0 20px;">
        <button class="btn-white" style="width: 56px; height: 56px; border-radius: 50%; padding: 0;">
          <i data-lucide="shuffle" size="20"></i>
        </button>
        <div style="display: flex; gap: 16px; align-items: center;">
          <button class="btn-primary" style="width: 64px; height: 64px; border-radius: 50%; padding: 0; background: white; color: var(--primary); border: 2px solid var(--primary);">
            <i data-lucide="chevron-left" size="32"></i>
          </button>
          <button class="btn-primary" style="width: 64px; height: 64px; border-radius: 50%; padding: 0;">
            <i data-lucide="chevron-right" size="32"></i>
          </button>
        </div>
        <button class="btn-white" style="width: 56px; height: 56px; border-radius: 50%; padding: 0;">
          <i data-lucide="play" size="20"></i>
        </button>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <button class="btn btn-white" style="font-size: 0.8125rem; border-color: #e5e7eb;">
          <i data-lucide="edit-3" size="16"></i> Sửa thẻ
        </button>
        <button class="btn btn-white" style="font-size: 0.8125rem; border-color: #e5e7eb;">
          <i data-lucide="star" size="16"></i> Gắn dấu sao
        </button>
      </div>
    </div>

  </main>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
